name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: Build (required for workspace type resolution)
        run: npm run build
      - name: Type check
        run: npm run lint --if-present

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Focused test jobs — each surfaces as its own pass/fail check in GitHub
  # ---------------------------------------------------------------------------

  test-core:
    name: "Test: core (vault-core)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run core tests
        run: npm test -w @velvetmonkey/vault-core

  test-read:
    name: "Test: read tools"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run read tests
        working-directory: packages/mcp-server
        run: npx vitest run test/read/

  test-write-core:
    name: "Test: write core"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run write core tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/core/ test/write/golden/ test/write/coldstart/ test/write/docs/ test/write/integration/ test/write/performance/

  test-write-tools:
    name: "Test: write tools & workflows"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run write tools tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/tools/ test/write/workflows/

  test-write-security:
    name: "Test: write security"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run security tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/security/

  test-write-stress:
    name: "Test: write stress & battle-hardening"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run stress tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/stress/ test/write/battle-hardening/

  test-platform:
    name: "Test: platform & publish"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run platform tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/platform/ test/write/publish/

  test-graph-quality:
    name: "Test: graph quality"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run graph quality tests
        working-directory: packages/mcp-server
        run: npx vitest run test/graph-quality/
      - name: Regression gate (baselines.json)
        working-directory: packages/mcp-server
        run: |
          npx vitest run test/graph-quality/regression-gate.test.ts

  test-bench:
    name: "Test: bench"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run bench tests
        run: npm test -w @velvetmonkey/flywheel-bench

  # ---------------------------------------------------------------------------
  # Full matrix — catches cross-platform + older Node regressions
  # ---------------------------------------------------------------------------

  test-full-matrix:
    name: "Test: full (Node ${{ matrix.node }} / ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: Build (required for workspace imports)
        run: npm run build
      - name: Run vault-core tests
        run: npm test -w @velvetmonkey/vault-core
      - name: Run mcp-server tests (excludes retrieval benchmarks)
        working-directory: packages/mcp-server
        run: npx vitest run --exclude 'test/retrieval-bench/**' --exclude 'test/write/publish/**'
