name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: Build (required for workspace type resolution)
        run: npm run build
      - name: Type check
        run: npm run lint --if-present

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: Build
        run: npm run build

  installer-smoke:
    name: "Installer Smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Smoke 1 — process substitution (bash <(curl …) shape)
        run: |
          mkdir -p /tmp/vault-procsub && cd /tmp/vault-procsub
          bash <(cat $GITHUB_WORKSPACE/skills/flywheel/scripts/install.sh)
          test -f .mcp.json
          jq -e '.mcpServers.flywheel.command == "npx"' .mcp.json
          jq -e '.mcpServers.flywheel.args == ["-y","@velvetmonkey/flywheel-memory"]' .mcp.json
      - name: Smoke 2 — pure pipe (curl … | bash shape)
        run: |
          mkdir -p /tmp/vault-pipe && cd /tmp/vault-pipe
          cat $GITHUB_WORKSPACE/skills/flywheel/scripts/install.sh | bash
          test -f .mcp.json
          jq -e '.mcpServers.flywheel' .mcp.json
      - name: Smoke 3 — in-tree invocation
        run: |
          mkdir -p /tmp/vault-tree && cd /tmp/vault-tree
          bash $GITHUB_WORKSPACE/skills/flywheel/scripts/install.sh
          test -f .mcp.json
          # SKILL.md must NOT be copied (fallback retired — single-purpose installer).
          if [ -f .claude/skills/flywheel/SKILL.md ]; then
            echo "::error::installer regressed: SKILL.md was copied (fallback should be retired)" >&2
            exit 1
          fi
      - name: Smoke 4 — idempotency
        run: |
          cd /tmp/vault-procsub
          bash <(cat $GITHUB_WORKSPACE/skills/flywheel/scripts/install.sh) | tee /tmp/second-run.log
          grep -q "unchanged" /tmp/second-run.log
      - name: Smoke 5 — vault arg + non-existent dir rejection
        run: |
          # Positional vault arg targets a different directory.
          mkdir -p /tmp/vault-arg
          bash $GITHUB_WORKSPACE/skills/flywheel/scripts/install.sh /tmp/vault-arg
          test -f /tmp/vault-arg/.mcp.json
          # Non-existent dir exits non-zero.
          if bash $GITHUB_WORKSPACE/skills/flywheel/scripts/install.sh /tmp/does-not-exist; then
            echo "::error::installer accepted non-existent vault dir" >&2
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Focused test jobs — each surfaces as its own pass/fail check in GitHub
  # ---------------------------------------------------------------------------

  test-core:
    name: "Test: core (vault-core)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run core tests
        run: npm test -w @velvetmonkey/vault-core

  test-read:
    name: "Test: read tools"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run read tests
        working-directory: packages/mcp-server
        run: npx vitest run test/read/

  test-write-core:
    name: "Test: write core"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run write core tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/core/ test/write/golden/ test/write/coldstart/ test/write/docs/ test/write/integration/ test/write/performance/

  test-write-tools:
    name: "Test: write tools & workflows"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run write tools tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/tools/ test/write/workflows/

  test-write-security:
    name: "Test: write security"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run security tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/security/

  test-write-stress:
    name: "Test: write stress & battle-hardening"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run stress tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/stress/ test/write/battle-hardening/

  test-platform:
    name: "Test: platform & publish"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run platform tests
        working-directory: packages/mcp-server
        run: npx vitest run test/write/platform/ test/write/publish/

  test-graph-quality:
    name: "Test: graph quality"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run graph quality tests
        working-directory: packages/mcp-server
        run: npx vitest run test/graph-quality/
      - name: Regression gate (baselines.json)
        working-directory: packages/mcp-server
        run: |
          npx vitest run test/graph-quality/regression-gate.test.ts

  test-bench:
    name: "Test: bench"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - run: npm run build
      - name: Run bench tests
        run: npm test -w @velvetmonkey/flywheel-bench

  # ---------------------------------------------------------------------------
  # Full matrix — catches cross-platform + older Node regressions
  # ---------------------------------------------------------------------------

  test-full-matrix:
    name: "Test: full (Node ${{ matrix.node }} / ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # The stdio-spawn e2e suites (cross-vault-isolation, watcher-batch) drop their
    # child server connection only on the Node 24 + Windows combo ("Not connected");
    # Node 22 + Windows and both Ubuntu legs are green. Keep the leg running for
    # visibility but make it non-gating so it doesn't fail the run, until the
    # Node-24-on-Windows boot issue can be debugged on a real Windows box.
    continue-on-error: ${{ matrix.os == 'windows-latest' && matrix.node == '24' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 5
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "::warning::npm ci attempt $i failed, retrying in 15s..."
            sleep 15
          done
      - name: Build (required for workspace imports)
        run: npm run build
      - name: Run vault-core tests
        run: npm test -w @velvetmonkey/vault-core
      - name: Run mcp-server tests (excludes retrieval benchmarks)
        working-directory: packages/mcp-server
        run: npx vitest run --exclude 'test/retrieval-bench/**' --exclude 'test/write/publish/**'
